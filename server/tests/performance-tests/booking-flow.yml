config:
  target: "http://localhost:5000"
  processor: "./booking-flow-processor.js"
  phases:
    - duration: 10
      arrivalRate: 1
  defaults:
    headers:
      Content-Type: "application/json"
  payload:
    path: "trips.csv"
    fields:
      - transportType
      - tripId
      - seatNumber
      - coachNumber
      - fromLocation
      - toLocation
    order: sequence   

scenarios:
  - name: "Safe Booking Flow Test"
    flow:

      # Ensure a dedicated user exists for this virtual user
      - function: "setupUser"

      # LOGIN
      - post:
          url: "/api/auth/login"
          json:
            email: "{{ email }}"
            password: "{{ password }}"
          capture:
            - json: "$.token"
              as: "authToken"
              strict: false

      # CREATE BOOKING
      - post:
          url: "/api/bookings/"
          ifTrue: "authToken"
          beforeRequest: "setValidDepartureTime"
          headers:
            Authorization: "Bearer {{ authToken }}"
          json:
            transportType: "{{ transportType }}"
            tripId: "{{ tripId }}"          
            seatNumbers:
              - "{{ seatNumber }}"          
            phoneNumber: "+94712345678"
            coachNumber: "{{ coachNumber }}" 
            fromLocation: "{{ fromLocation }}"
            toLocation: "{{ toLocation }}"
            departureTime: "{{ departureTime }}"
          capture:
            - json: "$._id"
              as: "bookingId"
              strict: false

      - log: "Booking Created: id={{ bookingId }}"

      # ---------------- GET THE CREATED BOOKING ----------------
      - get:
          url: "/api/bookings/me"
          ifTrue: "authToken"
          headers:
            Authorization: "Bearer {{ authToken }}"
      
      - log: "Read Booking: id={{ bookingId }}"

      # ---------------- UPDATE BOOKING ----------------
      - patch:
          url: "/api/bookings/{{ bookingId }}"
          ifTrue: "bookingId"
          headers:
            Authorization: "Bearer {{ authToken }}"
          json:
            phoneNumber: "+94719876543"  
        
      - log: "Booking updated: id={{ bookingId }}"

      # ---------------- CANCEL BOOKING ----------------
      - patch:
          url: "/api/bookings/{{ bookingId }}/cancel"
          ifTrue: "bookingId"
          headers:
            Authorization: "Bearer {{ authToken }}"

      - log: "Booking cancelled: id={{ bookingId }}"

       # ---------------- DELETE CANCELLED BOOKING ----------------
      - delete:
          url: "/api/bookings/{{ bookingId }}"
          ifTrue: "bookingId"
          headers:
            Authorization: "Bearer {{ authToken }}"

      - log: "Booking deleted: id={{ bookingId }}"
